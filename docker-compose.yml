services:
  api:
    container_name: drafty-api
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      PORT: 8000
      NODE_ENV: production
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8000/healthz >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
